<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Avisos y Promociones | Laboratorio Clínico</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-color: #00509D;
            --brand-hover: #003F7A;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --success: #10b981;
            --danger: #ef4444;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        header {
            width: 100%;
            background-color: var(--brand-color);
            color: white;
            padding: 20px 0;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .container {
            max-width: 900px;
            width: 95%;
            margin: 30px auto;
        }
        .card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }
        h2 { margin-top: 0; color: var(--brand-color); }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 14px; }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            font-family: inherit;
            box-sizing: border-box;
        }
        button {
            background-color: var(--brand-color);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background-color: var(--brand-hover); }
        button.secondary { background-color: var(--text-muted); }
        button.danger { background-color: var(--danger); }
        button.success { background-color: var(--success); }

        .promo-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        .promo-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #e5e7eb;
            position: relative;
            display: flex;
            flex-direction: column;
        }
        .promo-card.inactive { opacity: 0.6; }
        .promo-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
        }
        .badge-welcome { background: #dbeafe; color: #1e40af; }
        .badge-postname { background: #fef3c7; color: #92400e; }
        .badge-predelivery { background: #dcfce7; color: #166534; }

        /* Estilos Editor WhatsApp */
        .whatsapp-toolbar {
            display: flex;
            gap: 5px;
            margin-bottom: 5px;
        }
        .whatsapp-toolbar button {
            padding: 5px 10px;
            font-size: 12px;
            background: #e5e7eb;
            color: #374151;
            border: 1px solid #d1d5db;
        }
        .whatsapp-toolbar button:hover { background: #d1d5db; }
        
        .preview-box {
            margin-top: 10px;
            padding: 15px;
            background: #e5ddd5; /* Fondo clásico WhatsApp */
            border-radius: 8px;
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
        }
        .preview-label { font-size: 12px; font-weight: bold; color: #4b5563; margin-bottom: 8px; }
        .whatsapp-bubble {
            background: white;
            padding: 8px 12px;
            border-radius: 8px;
            max-width: 85%;
            font-size: 14.5px;
            line-height: 1.4;
            position: relative;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .whatsapp-bubble::before {
            content: "";
            position: absolute;
            top: 0; left: -8px;
            width: 0; height: 0;
            border-top: 0 solid transparent;
            border-bottom: 10px solid transparent;
            border-right: 10px solid white;
        }

        .promo-text { font-size: 14px; margin: 10px 0; flex-grow: 1; }
        .promo-img { 
            width: 100%; 
            height: 150px; 
            object-fit: cover; 
            border-radius: 8px; 
            margin-bottom: 10px;
            background: #f3f4f6;
        }
        .promo-actions { display: flex; gap: 10px; margin-top: 15px; }
        .promo-actions button { padding: 8px 12px; font-size: 13px; flex: 1; }
    </style>
</head>
<body>

<header>
    <h1>Gestión de Avisos y Promociones Clínicas</h1>
</header>

<div class="container">
    <div style="margin-bottom: 20px; text-align: left;">
        <a href="/" style="color: var(--brand-color); text-decoration: none; font-weight: 600;">← Volver al Inicio</a>
    </div>

    <!-- Formulario para agregar -->
    <div class="card">
        <h2>Nuevo Banner / Aviso</h2>
        <div class="form-group">
            <label>Posición en el Flujo Conversacional</label>
            <select id="position">
                <option value="WELCOME">Bienvenida Inicial (Con el primer saludo)</option>
                <option value="POST_NAME">Después de registrar el nombre</option>
                <option value="PRE_DELIVERY">Pre-Entrega (Justo antes de los PDFs de análisis)</option>
            </select>
        </div>
        <div class="form-group">
            <label>Texto de la Promoción / Aviso</label>
            <div class="whatsapp-toolbar">
                <button type="button" onclick="formatText('*')"><b>B</b></button>
                <button type="button" onclick="formatText('_')"><i>I</i></button>
                <button type="button" onclick="formatText('~')"><s>S</s></button>
                <button type="button" onclick="formatText('```')"><code>M</code></button>
                <button type="button" onclick="formatText('- ')">List</button>
            </div>
            <textarea id="promoText" rows="4" placeholder="Ej: Recuerde que este mes contamos con *15% de descuento* en el Perfil Femenino General." oninput="updatePreview()"></textarea>
            <div class="tip">💡 La previsualización muestra cómo se verá en WhatsApp.</div>
        </div>
        
        <div class="preview-box">
            <div class="preview-label">Previsualización:</div>
            <div id="whatsappPreview" class="whatsapp-bubble"></div>
        </div>
        <div class="form-group" style="margin-top: 15px;">
            <label>Imagen Adjunta (Opcional - JPG/PNG)</label>
            <input type="file" id="imageFile" accept="image/*">
        </div>
        <button onclick="addPromo()">Guardar Aviso / Promo</button>
    </div>

    <!-- Listado -->
    <h2>Avisos y Promociones Activas</h2>
    <div id="promoList" class="promo-list">
        <!-- Se cargan dinámicamente -->
    </div>
</div>

<script>
    async function fetchPromotions() {
        const res = await fetch('/api/promotions');
        const promos = await res.json();
        const container = document.getElementById('promoList');
        container.innerHTML = '';

        promos.forEach(p => {
            const card = document.createElement('div');
            card.className = `promo-card ${p.active ? '' : 'inactive'}`;
            
            const badgeClass = p.position === 'WELCOME' ? 'badge-welcome' : 
                               (p.position === 'POST_NAME' ? 'badge-postname' : 'badge-predelivery');
            const badgeText = p.position === 'WELCOME' ? 'Bienvenida' : 
                              (p.position === 'POST_NAME' ? 'Post-Nombre' : 'Pre-Entrega');

            card.innerHTML = `
                <span class="promo-badge ${badgeClass}">${badgeText}</span>
                ${p.image_url ? `<img src="${p.image_url}" class="promo-img">` : ''}
                <div class="promo-text">${p.text.replace(/\*(.*?)\*/g, '<b>$1</b>')}</div>
                <div class="promo-actions">
                    <button class="${p.active ? 'secondary' : 'success'}" onclick="togglePromo(${p.id}, ${p.active})">
                        ${p.active ? 'Pausar' : 'Activar'}
                    </button>
                    <button class="danger" onclick="deletePromo(${p.id})">Eliminar</button>
                </div>
            `;
            container.appendChild(card);
        });
    }

    // Funciones del Editor WhatsApp
    function formatText(symbol) {
        const textarea = document.getElementById('promoText');
        const start = textarea.selectionStart;
        const end = textarea.selectionEnd;
        const text = textarea.value;
        const selected = text.substring(start, end);

        if (symbol === '- ') {
            const before = text.substring(0, start);
            const after = text.substring(end);
            textarea.value = before + "\n- " + selected + after;
        } else {
            const before = text.substring(0, start);
            const after = text.substring(end);
            textarea.value = before + symbol + selected + symbol + after;
        }
        
        textarea.focus();
        updatePreview();
    }

    function updatePreview() {
        const text = document.getElementById('promoText').value;
        const preview = document.getElementById('whatsappPreview');
        
        let html = text
            .replace(/\*(.*?)\*/g, '<b>$1</b>')
            .replace(/_(.*?)_/g, '<i>$1</i>')
            .replace(/~(.*?)~/g, '<s>$1</s>')
            .replace(/```(.*?)```/gs, '<code>$1</code>')
            .replace(/^- (.*$)/gm, '• $1');

        preview.innerHTML = html || '<span style="color:#999">Escribe algo para previsualizar...</span>';
    }

    async function addPromo() {
        const text = document.getElementById('promoText').value;
        const imageFile = document.getElementById('imageFile').files[0];
        const position = document.getElementById('position').value;

        if (!text) return alert('El texto es obligatorio');

        const formData = new FormData();
        formData.append('text', text);
        formData.append('position', position);
        if (imageFile) formData.append('image', imageFile);

        const res = await fetch('/api/promotions', {
            method: 'POST',
            body: formData
        });

        if (res.ok) {
            document.getElementById('promoText').value = '';
            document.getElementById('imageFile').value = '';
            fetchPromotions();
        }
    }

    async function togglePromo(id, active) {
        const newActive = active ? 0 : 1;
        await fetch(`/api/promotions/${id}`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ active: newActive })
        });
        fetchPromotions();
    }

    async function deletePromo(id) {
        if (!confirm('¿Seguro que quieres eliminar esta promoción?')) return;
        await fetch(`/api/promotions/${id}`, { method: 'DELETE' });
        fetchPromotions();
    }

    fetchPromotions();
</script>

</body>
</html>
