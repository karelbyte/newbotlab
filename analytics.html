<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analítica de Consultas | Laboratorio Clínico</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --brand-color: #00509D;
            --brand-hover: #003F7A;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding-bottom: 50px;
        }
        header {
            width: 100%;
            background-color: var(--brand-color);
            color: white;
            padding: 30px 0;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .container {
            max-width: 1100px;
            width: 95%;
            margin: 30px auto;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: var(--brand-color);
            text-decoration: none;
            font-weight: 600;
        }
        
        /* Stats Grid */
        .stats-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }
        .stat-card h3 { margin: 0; font-size: 14px; color: var(--text-muted); text-transform: uppercase; }
        .stat-card .value { font-size: 32px; font-weight: 800; color: var(--brand-color); margin-top: 10px; }

        /* Charts Grid */
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 25px;
        }
        .chart-container {
            background: white;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }
        .chart-container h2 { font-size: 18px; margin-bottom: 20px; color: var(--text-main); }

        @media (max-width: 600px) {
            .charts-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header>
    <h1>Analíticas y Monitoreo del Bot Clínico</h1>
</header>

<div class="container">
    <a href="/" class="back-link">← Volver al Panel Central</a>

    <div class="stats-summary">
        <div class="stat-card">
            <h3>Consultas Entregadas</h3>
            <div class="value" id="totalQuotes">0</div>
        </div>
        <div class="stat-card">
            <h3>Pacientes Registrados</h3>
            <div class="value" id="totalClients">0</div>
        </div>
        <div class="stat-card">
            <h3>Códigos Buscados</h3>
            <div class="value" id="totalItems">0</div>
        </div>
    </div>

    <div class="charts-grid">
        <div class="chart-container">
            <h2>Actividad de Consultas Médicas (Últimos 7 días)</h2>
            <canvas id="activityChart"></canvas>
        </div>
        <div class="chart-container">
            <h2>Top 10 Códigos Más Consultados</h2>
            <canvas id="productsChart"></canvas>
        </div>
    </div>
</div>

<script>
    async function loadAnalytics() {
        const res = await fetch('/api/analytics');
        const data = await res.json();

        document.getElementById('totalQuotes').innerText = data.totalQuotes;
        document.getElementById('totalClients').innerText = data.totalClients;
        
        // Calcular total de consultas acumuladas en el top (estimación rápida)
        const totalItems = data.topProducts.reduce((acc, curr) => acc + curr.count, 0);
        document.getElementById('totalItems').innerText = totalItems;

        // Gráfico de Actividad Diaria
        const ctxActivity = document.getElementById('activityChart').getContext('2d');
        new Chart(ctxActivity, {
            type: 'line',
            data: {
                labels: data.dailyActivity.map(d => d.date),
                datasets: [{
                    label: 'Consultas Exitosas',
                    data: data.dailyActivity.map(d => d.count),
                    borderColor: '#00509D',
                    backgroundColor: 'rgba(0, 80, 157, 0.1)',
                    fill: true,
                    tension: 0.4
                }]
            },
            options: {
                responsive: true,
                plugins: { legend: { display: false } },
                scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } }
            }
        });

        // Gráfico de Códigos Consultados
        const ctxProducts = document.getElementById('productsChart').getContext('2d');
        new Chart(ctxProducts, {
            type: 'bar',
            data: {
                labels: data.topProducts.map(p => p.descrip),
                datasets: [{
                    label: 'Veces Consultado',
                    data: data.topProducts.map(p => p.count),
                    backgroundColor: '#00509D',
                    borderRadius: 5
                }]
            },
            options: {
                indexAxis: 'y',
                responsive: true,
                plugins: { legend: { display: false } },
                scales: { x: { beginAtZero: true } }
            }
        });
    }

    loadAnalytics();
</script>

</body>
</html>
